<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>回合制打斗</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 999;
            text-align: center;
        }
        #loading.error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="loading">正在加载游戏，请稍候...</div>

    <script src="https://cdn.jsdelivr.net/npm/cheerpj@3.1.0/cjs/cj3loader.js"></script>
    <script>
        window.onload = async function() {
            try {
                await cheerpjInit();
                document.getElementById('loading').style.display = 'none';
                cheerpjCreateDisplay("#game-container");
                await cheerpjRunJar("./ChanelBattleGame.jar");
            } catch(e) {
                var loadingEl = document.getElementById('loading');
                loadingEl.innerHTML = '加载失败，请检查网络或稍后重试。<br><small>错误信息：' + e.message + '</small><br><small>详细：' + (e.stack || '') + '</small>';
                loadingEl.className = 'error';
                console.error(e);
            }
        };
    </script>
</body>
</html>
